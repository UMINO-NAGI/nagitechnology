<div id="container-8da9d415338f42cfd2d45ae21e6fcb05"></div>

  <!-- Script extra Adsterra -->
  <script type='text/javascript' src='//mascarapersonality.com/c2/47/b7/c247b7e308a0a5e383a2c5889766435e.js'></script>
  <script>
    const TEMPO_MINIMO = 30000; // 30 segundos
    let inicio = Date.now();
    let validado = false;

    function validarTarefa() {
      const agora = Date.now();
      const visivel = document.visibilityState === 'visible';
      if (!validado && visivel && (agora - inicio >= TEMPO_MINIMO)) {
        window.parent.postMessage({ tipo: 'anuncio_valido' }, '*');
        document.getElementById('status').textContent = '✅ Anúncio validado com sucesso!';
        validado = true;
      }
    }

    setInterval(validarTarefa, 2000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') {
        inicio = Date.now();
      }
    });
  </script>
</body>
