  <!-- Lógica de validação de tempo de anúncio -->
  <script>
    const TEMPO_MINIMO = 30000; // 30 segundos
    let inicio = Date.now();
    let anuncioAtivo = true;

    function validarAnuncio() {
      const tempo = Date.now() - inicio;
      const visivel = document.visibilityState === 'visible';

      if (tempo >= TEMPO_MINIMO && visivel && anuncioAtivo) {
        document.getElementById("mensagem").textContent = "✅ Anúncio validado! Pontuação enviada.";
        window.parent.postMessage({ tipo: "anuncio_valido" }, "*");
        anuncioAtivo = false;
      }
    }

    const intervalo = setInterval(validarAnuncio, 2000);

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== 'visible') {
        inicio = Date.now();
      }
    });
  </script>
<script src="../popup.js"></script>
